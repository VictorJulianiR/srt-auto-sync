<script>
        function updateLabel(inputId, labelId) {
            const input = document.getElementById(inputId);
            const label = document.getElementById(labelId);
            if (input.files.length > 0) {
                label.textContent = input.files[0].name;
                label.classList.add("text-blue-400");
            }
        }

        // NOVA FUNÇÃO: Lê o arquivo e resolve os acentos automaticamente (ANSI para UTF-8)
        async function readSrtFile(file) {
            const buffer = await file.arrayBuffer();
            try {
                // Tenta ler como UTF-8 puro. Se tiver acentos mal formatados (ANSI), ele dá erro.
                return new TextDecoder('utf-8', { fatal: true }).decode(buffer);
            } catch (e) {
                // Se deu erro, é porque provavelmente está em ANSI (Windows-1252).
                // Ele converte do padrão latino/português para UTF-8.
                return new TextDecoder('windows-1252').decode(buffer);
            }
        }

        async function processFiles() {
            const gtFile = document.getElementById('gt-file').files[0];
            const trFile = document.getElementById('tr-file').files[0];

            if (!gtFile || !trFile) {
                alert("Please upload both SRT files.");
                return;
            }

            const btn = document.getElementById('process-btn');
            btn.disabled = true;
            btn.textContent = "Processing...";

            try {
                // Substituímos as chamadas antigas pela nova função de leitura com conversão
                const gtText = await readSrtFile(gtFile);
                const trText = await readSrtFile(trFile);

                const gtSubs = parseSrt(gtText);
                const trSubs = parseSrt(trText);

                if(gtSubs.length === 0 || trSubs.length === 0) {
                    throw new Error("Could not parse one or both subtitle files. Check format.");
                }

                const result = syncSubs(gtSubs, trSubs);
                
                const outputSrt = buildSrt(result.syncedSubs);
                
                document.getElementById('report-text').textContent = result.report;
                document.getElementById('output-text').value = outputSrt;
                
                // PREPARAR DOWNLOAD: '\uFEFF' adiciona o BOM (Byte Order Mark) do UTF-8. 
                // Isso força o Windows e TVs a lerem os acentos corretamente.
                const blob = new Blob(['\uFEFF' + outputSrt], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const dlBtn = document.getElementById('download-btn');
                dlBtn.href = url;
                dlBtn.download = trFile.name.replace('.srt', '_synced.srt');

                document.getElementById('output-section').classList.remove('hidden');
                
            } catch (err) {
                alert("Error: " + err.message);
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.textContent = "Analyze & Sync Subtitles";
            }
        }

        /* --- SRT PARSER & BUILDER --- */
        function parseSrt(data) {
            // Normalize endings
            data = data.replace(/\r\n/g, '\n').replace(/\n{3,}/g, '\n\n').trim();
            const blocks = data.split('\n\n');
            const subs =[];
            for (let block of blocks) {
                const lines = block.split('\n');
                if (lines.length >= 3) {
                    const times = lines[1].split(' --> ');
                    if (times.length === 2) {
                        subs.push({
                            id: lines[0],
                            start: timeToMs(times[0]),
                            end: timeToMs(times[1]),
                            text: lines.slice(2).join('\n')
                        });
                    }
                }
            }
            return subs;
        }

        function buildSrt(subs) {
            return subs.map((sub, index) => {
                return `${index + 1}\n${msToTime(sub.start)} --> ${msToTime(sub.end)}\n${sub.text}`;
            }).join('\n\n');
        }

        function timeToMs(timeStr) {
            const parts = timeStr.trim().split(',');
            const [h, m, s] = parts[0].split(':');
            const ms = parts[1] ? parseInt(parts[1]) : 0;
            return parseInt(h) * 3600000 + parseInt(m) * 60000 + parseInt(s) * 1000 + ms;
        }

        function msToTime(ms) {
            ms = Math.max(0, Math.round(ms));
            let h = Math.floor(ms / 3600000).toString().padStart(2, '0');
            let m = Math.floor((ms % 3600000) / 60000).toString().padStart(2, '0');
            let s = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
            let msec = (ms % 1000).toString().padStart(3, '0');
            return `${h}:${m}:${s},${msec}`;
        }

        /* --- SYNCHRONIZATION ALGORITHM --- */
        function syncSubs(gtSubs, trSubs) {
            const stretchCandidates =[
                1.0,               // No stretch, just offset
                24 / 23.976,       // NTSC to Film
                23.976 / 24,       // Film to NTSC
                25 / 24,           // PAL to Film
                24 / 25,           // Film to PAL
                25 / 23.976,       // PAL to NTSC
                23.976 / 25        // NTSC to PAL
            ];

            let gt_i1 = Math.floor(gtSubs.length * 0.1);
            let gt_i2 = Math.floor(gtSubs.length * 0.9);
            let tr_i1 = Math.floor(trSubs.length * 0.1);
            let tr_i2 = Math.floor(trSubs.length * 0.9);
            
            if (gt_i1 < gt_i2 && tr_i1 < tr_i2) {
                let empiricalStretch = (gtSubs[gt_i2].start - gtSubs[gt_i1].start) / (trSubs[tr_i2].start - trSubs[tr_i1].start);
                stretchCandidates.push(empiricalStretch);
            }

            let bestMatchCount = -1;
            let bestStretch = 1;
            let bestOffset = 0;

            for (let stretch of stretchCandidates) {
                let offset = findRobustOffset(gtSubs, trSubs, stretch);
                
                let matches = 0;
                for (let tr of trSubs) {
                    let syncedStart = tr.start * stretch + offset;
                    for (let gt of gtSubs) {
                        if (Math.abs(gt.start - syncedStart) < 150) { 
                            matches++;
                            break;
                        }
                    }
                }

                if (matches > bestMatchCount) {
                    bestMatchCount = matches;
                    bestStretch = stretch;
                    bestOffset = offset;
                }
            }

            let report = "";
            let matchConfidence = Math.round((bestMatchCount / trSubs.length) * 100);
            
            if (Math.abs(bestStretch - 1.0) < 0.001) {
                report = `✅ ANALYSIS COMPLETE\n\n` +
                         `Conclusion: The entry point was wrong (Constant Offset).\n` +
                         `No significant time stretching / framerate differences were detected.\n\n` +
                         `• Time Stretching Applied: None (1.0x)\n` +
                         `• Entry Offset Applied: ${bestOffset.toFixed(0)} ms\n` +
                         `• Subtitle Match Confidence: ${matchConfidence}%`;
            } else {
                let stretchName = "Custom empirical stretch";
                if (Math.abs(bestStretch - (24/23.976)) < 0.001) stretchName = "23.976fps → 24fps";
                if (Math.abs(bestStretch - (23.976/24)) < 0.001) stretchName = "24fps → 23.976fps";
                if (Math.abs(bestStretch - (25/24)) < 0.001) stretchName = "24fps → 25fps";
                if (Math.abs(bestStretch - (24/25)) < 0.001) stretchName = "25fps → 24fps";

                report = `⚠️ ANALYSIS COMPLETE\n\n` +
                         `Conclusion: Framerate difference / Time Stretching detected.\n` +
                         `The translated file was stretched and delayed compared to the ground truth.\n\n` +
                         `• Detected Framerate Change: ${stretchName}\n` +
                         `• Exact Stretch Multiplier: ${bestStretch.toFixed(5)}x\n` +
                         `• Base Entry Offset Applied: ${bestOffset.toFixed(0)} ms\n` +
                         `• Subtitle Match Confidence: ${matchConfidence}%`;
            }

            let syncedSubs = trSubs.map(sub => {
                return {
                    id: sub.id,
                    start: Math.round(sub.start * bestStretch + bestOffset),
                    end: Math.round(sub.end * bestStretch + bestOffset),
                    text: sub.text
                };
            });

            return { syncedSubs, report };
        }

        function findRobustOffset(gtSubs, trSubs, stretch) {
            let bins = {};
            let maxCount = 0;
            let bestBin = 0;

            let step = Math.max(1, Math.floor(trSubs.length / 500)); 

            for (let i = 0; i < gtSubs.length; i += step) {
                for (let j = 0; j < trSubs.length; j += step) {
                    let off = gtSubs[i].start - (trSubs[j].start * stretch);
                    let bin = Math.round(off / 100) * 100; 
                    bins[bin] = (bins[bin] || 0) + 1;
                    if (bins[bin] > maxCount) {
                        maxCount = bins[bin];
                        bestBin = bin;
                    }
                }
            }

            let validOffsets =[];
            for (let i = 0; i < gtSubs.length; i++) {
                for (let j = 0; j < trSubs.length; j++) {
                    let off = gtSubs[i].start - (trSubs[j].start * stretch);
                    if (Math.abs(off - bestBin) <= 150) {
                        validOffsets.push(off);
                    }
                }
            }
            
            if (validOffsets.length === 0) return bestBin;

            validOffsets.sort((a,b) => a-b);
            return validOffsets[Math.floor(validOffsets.length / 2)];
        }
    </script>
